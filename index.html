<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sight Count</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --text-muted: #555;
    --danger: #ff4747;
    --overlay-bg: rgba(10,10,10,0.85);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HOME ── */
  #home {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #home::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
    opacity: 0.5;
    pointer-events: none;
  }

  .home-content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 24px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 18vw, 140px);
    line-height: 0.9;
    color: var(--text);
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s 0.35s forwards;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
    opacity: 0;
    animation: fadeUp 0.6s 0.5s forwards;
  }

  .start-btn {
    margin-top: 48px;
    padding: 18px 52px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.6s 0.65s forwards;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .start-btn:active { transform: scale(0.97); }

  .home-corner {
    position: absolute;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }
  .home-corner.tl { top: 20px; left: 20px; }
  .home-corner.tr { top: 20px; right: 20px; }
  .home-corner.bl { bottom: 20px; left: 20px; }
  .home-corner.br { bottom: 20px; right: 20px; }

  #config-btn {
    position: absolute;
    bottom: 20px; left: 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s 0.8s forwards;
  }

  /* ── CAMERA SCREEN ── */
  #camera-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: #000;
    position: relative;
  }
  #camera-screen.active { display: flex; }

  .video-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* result canvas shown after capture */
  #result-canvas {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #result-canvas.show { display: block; }

  /* corner brackets */
  .bracket {
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .bracket.tl { top: 16px; left: 16px;   border-width: 2px 0 0 2px; }
  .bracket.tr { top: 16px; right: 16px;  border-width: 2px 2px 0 0; }
  .bracket.bl { bottom: 16px; left: 16px;  border-width: 0 0 2px 2px; }
  .bracket.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  /* HUD */
  .hud-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    pointer-events: none;
  }
  .hud-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .hud-mode {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* ── CAPTURE BUTTON ── */
  .capture-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 32px max(20px, env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  }

  .capture-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s;
    flex-shrink: 0;
    margin: 0 auto;
  }
  .capture-btn::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.15s, opacity 0.15s;
  }
  .capture-btn:active { transform: scale(0.92); }
  .capture-btn:active::after { opacity: 0.7; }

  /* retake button — shown after capture */
  .retake-btn {
    display: none;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .retake-btn.show { display: block; }
  .retake-btn:active { border-color: var(--accent); color: var(--accent); }

  .stop-btn {
    padding: 10px 22px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .stop-btn:active { border-color: var(--danger); color: var(--danger); }

  /* ── RESULT OVERLAY ── */
  #result-overlay {
    display: none;
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  #result-overlay.show { display: flex; }

  .count-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 20vw, 120px);
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(232,255,71,0.4);
    animation: countPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .count-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(232,255,71,0.6);
    text-transform: uppercase;
    margin-top: -8px;
  }

  @keyframes countPop {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── PROCESSING SPINNER ── */
  #processing {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: rgba(0,0,0,0.5);
  }
  #processing.show { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .processing-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR OVERLAY ── */
  #error-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 32px;
  }
  #error-overlay.show { display: flex; }
  .error-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--danger);
    letter-spacing: 0.05em;
  }
  .error-msg {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 280px;
  }
  .retry-btn {
    margin-top: 8px;
    padding: 12px 32px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .err-back-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
  }

  /* ── CONFIG MODAL ── */
  #config-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  #config-modal.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    width: 100%;
    max-width: 420px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    color: var(--accent);
  }
  .modal-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 12px; }
  .modal-save {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .modal-cancel {
    padding: 12px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- ── HOME ── -->
<div id="home">
  <div class="home-corner tl">SIGHT COUNT</div>
  <div class="home-corner tr">v0.1.0</div>
  <div class="home-corner br">YOLOv8s</div>

  <div class="home-content">
    <div class="eyebrow">Hardware Vision System</div>
    <div class="logo">SIGHT<br><span>COUNT</span></div>
    <div class="tagline">Point · Capture · Count</div>
    <button class="start-btn" onclick="startCamera()">Start Analyzing</button>
  </div>

  <button id="config-btn" onclick="showConfig()">⚙ API Config</button>
</div>

<!-- ── CAMERA SCREEN ── -->
<div id="camera-screen">
  <div class="video-wrap">

    <!-- live viewfinder -->
    <video id="video" autoplay playsinline muted></video>

    <!-- result image with boxes drawn on it -->
    <canvas id="result-canvas"></canvas>

    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="hud-bar">
      <div class="hud-label">Sight Count</div>
      <div class="hud-mode" id="hud-mode">READY</div>
    </div>

    <!-- count shown after result -->
    <div id="result-overlay">
      <div class="count-number" id="count-number">0</div>
      <div class="count-label">items detected</div>
    </div>

    <!-- processing spinner -->
    <div id="processing">
      <div class="spinner"></div>
      <div class="processing-label">Analyzing…</div>
    </div>

    <!-- error -->
    <div id="error-overlay">
      <div class="error-title">Error</div>
      <div class="error-msg" id="error-msg">Unable to reach the inference API.</div>
      <button class="retry-btn" onclick="retake()">Retake</button>
      <button class="err-back-btn" onclick="stopCamera()">Back</button>
    </div>

    <div class="capture-bar">
      <button class="stop-btn" onclick="stopCamera()">Back</button>
      <button class="capture-btn" id="capture-btn" onclick="capture()" aria-label="Capture"></button>
      <button class="retake-btn" id="retake-btn" onclick="retake()">Retake</button>
    </div>

  </div>
</div>

<!-- ── CONFIG MODAL ── -->
<div id="config-modal">
  <div class="modal-box">
    <div class="modal-title">API Config</div>
    <label class="modal-label">Inference API URL</label>
    <input class="modal-input" id="api-url-input" type="url"
      placeholder="https://xxxx.trycloudflare.com">
    <div class="modal-actions">
      <button class="modal-save" onclick="saveConfig()">Save</button>
      <button class="modal-cancel" onclick="hideConfig()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_API = 'https://kiss-harold-gap-rainbow.trycloudflare.com';
  const BOX_COLORS = {
    bolt:   '#e8ff47',
    nut:    '#47e8ff',
    screw:  '#ff8c47',
    washer: '#c847ff',
  };
  const DEFAULT_COLOR = '#e8ff47';

  let apiBase = localStorage.getItem('sight-count-api') || DEFAULT_API;
  let stream  = null;

  const video         = document.getElementById('video');
  const resultCanvas  = document.getElementById('result-canvas');
  const rctx          = resultCanvas.getContext('2d');
  const captureBtn    = document.getElementById('capture-btn');
  const retakeBtn     = document.getElementById('retake-btn');
  const resultOverlay = document.getElementById('result-overlay');
  const countEl       = document.getElementById('count-number');
  const processing    = document.getElementById('processing');
  const errorOverlay  = document.getElementById('error-overlay');
  const errorMsg      = document.getElementById('error-msg');
  const hudMode       = document.getElementById('hud-mode');

  // ── Config ──
  function showConfig() {
    document.getElementById('api-url-input').value = apiBase;
    document.getElementById('config-modal').classList.add('show');
  }
  function hideConfig() {
    document.getElementById('config-modal').classList.remove('show');
  }
  function saveConfig() {
    const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
    if (val) { apiBase = val; localStorage.setItem('sight-count-api', val); }
    hideConfig();
  }

  // ── Camera ──
  async function startCamera() {
    document.getElementById('home').style.display = 'none';
    document.getElementById('camera-screen').classList.add('active');
    resetToViewfinder();

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      hudMode.textContent = 'READY';
    } catch (e) {
      showError('Camera access denied or unavailable. Check browser permissions.');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('camera-screen').classList.remove('active');
    document.getElementById('home').style.display = '';
  }

  function resetToViewfinder() {
    video.style.display = 'block';
    resultCanvas.classList.remove('show');
    resultOverlay.classList.remove('show');
    processing.classList.remove('show');
    errorOverlay.classList.remove('show');
    captureBtn.style.display = 'block';
    retakeBtn.classList.remove('show');
    hudMode.textContent = 'READY';
  }

  function retake() {
    resetToViewfinder();
  }

  // ── Capture & Infer ──
  async function capture() {
    if (!video.videoWidth) return;

    // Freeze: hide viewfinder, show processing
    video.style.display = 'none';
    captureBtn.style.display = 'none';
    processing.classList.add('show');
    hudMode.textContent = 'ANALYZING';

    // Snap frame to an offscreen canvas
    const snap = document.createElement('canvas');
    snap.width  = video.videoWidth;
    snap.height = video.videoHeight;
    snap.getContext('2d').drawImage(video, 0, 0);

    // Size result canvas to video-wrap display size
    resultCanvas.width  = video.clientWidth;
    resultCanvas.height = video.clientHeight;

    // Draw the snapshot scaled to fill result canvas
    rctx.drawImage(snap, 0, 0, resultCanvas.width, resultCanvas.height);
    resultCanvas.classList.add('show');

    const blob = await new Promise(res => snap.toBlob(res, 'image/jpeg', 0.85));
    const form = new FormData();
    form.append('file', blob, 'capture.jpg');

    try {
      const res = await fetch(`${apiBase}/count`, { method: 'POST', body: form });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      processing.classList.remove('show');
      renderBoxes(data, snap.width, snap.height);
      countEl.textContent = data.total ?? 0;
      resultOverlay.classList.add('show');
      retakeBtn.classList.add('show');
      hudMode.textContent = 'RESULT';

    } catch (e) {
      processing.classList.remove('show');
      showError(`API error: ${e.message}`);
    }
  }

  function renderBoxes(data, srcW, srcH) {
    const scaleX = resultCanvas.width  / srcW;
    const scaleY = resultCanvas.height / srcH;

    if (!data.detections || !data.detections.length) return;

    data.detections.forEach(det => {
      const [x1, y1, x2, y2] = det.bbox;
      const rx = x1 * scaleX, ry = y1 * scaleY;
      const rw = (x2 - x1) * scaleX, rh = (y2 - y1) * scaleY;
      const color = BOX_COLORS[det.label?.toLowerCase()] || DEFAULT_COLOR;
      const conf  = Math.round((det.confidence ?? 1) * 100);

      // Box glow
      rctx.shadowColor = color;
      rctx.shadowBlur  = 8;
      rctx.strokeStyle = color;
      rctx.lineWidth   = 2;
      rctx.strokeRect(rx, ry, rw, rh);
      rctx.shadowBlur  = 0;

      // Label pill
      const label = `${det.label}  ${conf}%`;
      rctx.font = 'bold 12px DM Mono, monospace';
      const tw = rctx.measureText(label).width;
      const ph = 20, pw = tw + 12;
      const lx = rx;
      const ly = ry > ph + 4 ? ry - ph - 4 : ry + 4;

      rctx.fillStyle = color;
      rctx.fillRect(lx, ly, pw, ph);
      rctx.fillStyle = '#0a0a0a';
      rctx.fillText(label, lx + 6, ly + 14);
    });
  }

  function showError(msg) {
    processing.classList.remove('show');
    errorMsg.textContent = msg;
    errorOverlay.classList.add('show');
    hudMode.textContent = 'ERROR';
  }

  document.getElementById('api-url-input').value = apiBase;
</script>
</body>
</html>
